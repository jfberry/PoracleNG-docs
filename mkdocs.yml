site_name: PoracleNG Documentation
site_description: Documentation for PoracleNG - Pokemon Go notification system
site_url: https://jfberry.github.io/PoracleNG-docs/

repo_url: https://github.com/jfberry/PoracleNG-docs
repo_name: jfberry/PoracleNG-docs
edit_uri: edit/main/docs/

theme:
  name: material
  favicon: assets/favicon.ico
  logo: assets/PoracleNG.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

